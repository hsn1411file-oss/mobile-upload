<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<link rel="manifest"
href="pwa-manifest.json">

<meta
name="theme-color"
content="#2563eb">

<title>
مرصود
</title>

<style>

:root{

    --frame-width:150px;

}

body{

    margin:0;
    background:#0f172a;
    color:white;
    font-family:Tahoma;
    text-align:center;

}

.container{

    padding:15px;

}

h1{

    margin-bottom:15px;

}

#videoContainer{

    position:relative;
    width:100%;
    max-width:500px;
    margin:auto;
    border-radius:20px;
    overflow:hidden;
    background:black;

}

video{

    width:100%;
    display:block;

}

#frame{

    position:absolute;
    top:0;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    width:var(--frame-width);
    border:4px solid red;
    border-radius:12px;
    box-sizing:border-box;
    pointer-events:none;

}

.controls{

    margin-top:15px;
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;

}

button{

    border:none;
    border-radius:12px;
    padding:14px 20px;
    font-size:18px;
    cursor:pointer;

}

#framePlus,
#frameMinus{

    width:65px;
    background:#1e293b;
    color:white;

}

#captureBtn{

    background:#2563eb;
    color:white;
    min-width:200px;

}

#useBtn{

    background:#16a34a;
    color:white;

}

#retryBtn{

    background:#dc2626;
    color:white;

}

#preview{

    margin-top:20px;
    max-width:100%;
    border-radius:15px;
    display:none;

}

#useBtn,
#retryBtn{

    display:none;

}

#status{

    margin-top:15px;
    font-size:18px;

}

canvas{

    display:none;

}

</style>

</head>

<body>

<div class="container">

<h1>
📸 مرصود
</h1>

<div id="videoContainer">

<video
id="video"
autoplay
playsinline>
</video>

<div id="frame"></div>

</div>

<div class="controls">

<button id="frameMinus">
➖
</button>

<button id="framePlus">
➕
</button>

</div>

<div class="controls">

<button id="captureBtn">
📸 تصوير
</button>

</div>

<img id="preview">

<div class="controls">

<button id="useBtn">
✅ استخدام الصورة
</button>

<button id="retryBtn">
🔄 إعادة التصوير
</button>

</div>

<div id="status">
جاهز
</div>

<canvas id="canvas"></canvas>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL =
"https://kztwzelltnomrbsdmukt.supabase.co";

const SUPABASE_KEY =
"ضع_مفتاح_anon_هنا";

const supabaseClient =
supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

const params =
new URLSearchParams(
    window.location.search
);

const SESSION_ID =
params.get("session");

const video =
document.getElementById(
    "video"
);

const canvas =
document.getElementById(
    "canvas"
);

const preview =
document.getElementById(
    "preview"
);

const captureBtn =
document.getElementById(
    "captureBtn"
);

const useBtn =
document.getElementById(
    "useBtn"
);

const retryBtn =
document.getElementById(
    "retryBtn"
);

const framePlus =
document.getElementById(
    "framePlus"
);

const frameMinus =
document.getElementById(
    "frameMinus"
);

const statusText =
document.getElementById(
    "status"
);

let frameWidth = 150;

document.documentElement
.style.setProperty(
    "--frame-width",
    frameWidth + "px"
);

let croppedBlob = null;

navigator.mediaDevices
.getUserMedia({

    video:{
    facingMode:"environment"
}

})
.then(stream => {

    video.srcObject =
        stream;

})
.catch(error => {

    console.error(error);

    alert(
        "تعذر تشغيل الكاميرا"
    );

});

framePlus.addEventListener(
    "click",

    () => {

        frameWidth += 20;

        if(frameWidth > 350)
            frameWidth = 350;

        document.documentElement
        .style.setProperty(
            "--frame-width",
            frameWidth + "px"
        );

    }
);

frameMinus.addEventListener(
    "click",

    () => {

        frameWidth -= 20;

        if(frameWidth < 80)
            frameWidth = 80;

        document.documentElement
        .style.setProperty(
            "--frame-width",
            frameWidth + "px"
        );

    }
);

captureBtn.addEventListener(
    "click",

    () => {

        const ctx =
            canvas.getContext("2d");

        const vw =
            video.videoWidth;

        const vh =
            video.videoHeight;

        const displayWidth =
            video.clientWidth;

        const scale =
            vw / displayWidth;

        const cropWidth =
            frameWidth * scale;

        const cropX =
            (vw / 2) -
            (cropWidth / 2);

        canvas.width =
            cropWidth;

        canvas.height =
            vh;

        ctx.drawImage(

            video,

            cropX,
            0,

            cropWidth,
            vh,

            0,
            0,

            cropWidth,
            vh

        );

        canvas.toBlob(blob => {

            croppedBlob =
                blob;

            preview.src =
                URL.createObjectURL(
                    blob
                );

            preview.style.display =
                "block";

            useBtn.style.display =
                "inline-block";

            retryBtn.style.display =
                "inline-block";

            video.style.display =
                "none";

            document.getElementById(
                "frame"
            ).style.display =
                "none";

        },
        "image/jpeg",
        0.95);

    }
);

retryBtn.addEventListener(
    "click",

    () => {

        preview.style.display =
            "none";

        useBtn.style.display =
            "none";

        retryBtn.style.display =
            "none";

        video.style.display =
            "block";

        document.getElementById(
            "frame"
        ).style.display =
            "block";

    }
);

useBtn.addEventListener(
    "click",

    async () => {

        try{

            statusText.innerHTML =
                "⏳ جاري رفع الصورة...";

            const fileName =
                `${SESSION_ID}/${Date.now()}.jpg`;

            const {
                data,
                error
            } = await supabaseClient
            .storage
            .from("uploads")
            .upload(
                fileName,
                croppedBlob,
                {
                    contentType:"image/jpeg"
                }
            );

            if(error){

                console.log(error);

                statusText.innerHTML =
                    "❌ فشل رفع الصورة";

                return;

            }

            statusText.innerHTML =
                "✅ تم رفع الصورة بنجاح";

        }
        catch(error){

            console.error(error);

            alert(error);

            statusText.innerHTML =
                "❌ فشل الرفع";

        }

    }
);

if (
    "serviceWorker"
    in navigator
) {

    navigator
    .serviceWorker
    .register(
        "./sw.js"
    )
    .then(() => {

        console.log(
            "SW Registered"
        );

    });

}

</script>

</body>
</html>
