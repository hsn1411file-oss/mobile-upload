<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
رفع كشف الدرجات
</title>

<style>

body {

    font-family: Tahoma;

    background: #f1f5f9;

    padding: 20px;

    text-align: center;
}

.box {

    background: white;

    border-radius: 20px;

    padding: 25px;

    max-width: 420px;

    margin: auto;

    box-shadow:
        0 4px 15px rgba(0,0,0,0.08);

    overflow:auto;

    max-height:95vh;
}

h1 {

    color: #1e3a8a;

    margin-bottom: 20px;
}

input {

    width: 100%;

    box-sizing: border-box;

    padding: 14px;

    border-radius: 14px;

    border: 1px solid #cbd5e1;

    margin-bottom: 15px;

    font-size: 16px;
}

button {

    width: 100%;

    padding: 15px;

    border: none;

    border-radius: 14px;

    background: linear-gradient(
        135deg,
        #2563eb,
        #1d4ed8
    );

    color: white;

    font-size: 18px;

    font-weight: bold;

    cursor: pointer;

    margin-top:10px;
}

#status {

    margin-top: 18px;

    font-size: 18px;

    font-weight: bold;
}

#cropCanvas {

    width:100%;

    height:auto;

    display:block;

    border:2px solid #999;

    margin-top:10px;

    touch-action:none;

    border-radius:10px;
}

</style>

</head>

<body>

<div class="box">

<h1>
📷 رفع كشف الدرجات
</h1>

<input
type="file"
id="imageInput"
accept="image/*"
capture="environment">

<canvas
id="cropCanvas"
></canvas>

<button id="cropBtn">
قص العمود
</button>

<button id="uploadBtn">
🚀 رفع الصورة
</button>

<div id="status">
جاهز
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL = "https://kztwzelltnomrbsdmukt.supabase.co";

const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6dHd6ZWxsdG5vbXJic2RtdWt0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NTE1NTMsImV4cCI6MjA5NDUyNzU1M30.mPizyA4g3z8gnYYRMsHLkIAABiw0T5fjWmC1o7WgFQc";

const supabaseClient =
    supabase.createClient(
        SUPABASE_URL,
        SUPABASE_KEY
    );

// Session
const params =
    new URLSearchParams(
        window.location.search
    );

const SESSION_ID =
    params.get("session");

const uploadBtn =
    document.getElementById(
        "uploadBtn"
    );

const imageInput =
    document.getElementById(
        "imageInput"
    );

const statusDiv =
    document.getElementById(
        "status"
    );

const canvas =
    document.getElementById(
        "cropCanvas"
    );

const ctx =
    canvas.getContext("2d");

const cropBtn =
    document.getElementById(
        "cropBtn"
    );

let img =
    new Image();

let cropX = 50;

const cropWidth = 180;

// رسم الشريط
function drawCropBar() {

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    ctx.drawImage(
        img,
        0,
        0
    );

    ctx.strokeStyle =
        "red";

    ctx.lineWidth = 4;

    ctx.strokeRect(
        cropX,
        0,
        cropWidth,
        canvas.height
    );
}

// رفع الصورة
imageInput.addEventListener(
    "change",

    () => {

        const file =
            imageInput.files[0];

        if (!file)
            return;

        const reader =
            new FileReader();

        reader.onload =
            (e) => {

                img.onload = () => {

                    canvas.width =
                        img.width;

                    canvas.height =
                        img.height;

                    drawCropBar();
                };

                img.src =
                    e.target.result;
            };

        reader.readAsDataURL(
            file
        );
    }
);

// تحريك العمود
canvas.addEventListener(
    "pointermove",

    (e) => {

        cropX =
            e.offsetX -
            (cropWidth / 2);

        drawCropBar();
    }
);

// قص العمود
cropBtn.addEventListener(
    "click",

    () => {

        const tempCanvas =
            document.createElement(
                "canvas"
            );

        tempCanvas.width =
            cropWidth;

        tempCanvas.height =
            canvas.height;

        const tempCtx =
            tempCanvas.getContext(
                "2d"
            );

        tempCtx.drawImage(
            canvas,
            cropX,
            0,
            cropWidth,
            canvas.height,
            0,
            0,
            cropWidth,
            canvas.height
        );

        canvas.width =
            cropWidth;

        canvas.height =
            tempCanvas.height;

        ctx.clearRect(
            0,
            0,
            canvas.width,
            canvas.height
        );

        ctx.drawImage(
            tempCanvas,
            0,
            0
        );

        img.src =
            tempCanvas.toDataURL();
    }
);

// رفع الصورة المقصوصة
uploadBtn.addEventListener(
    "click",

    async () => {

        statusDiv.innerHTML =
            "⏳ جاري رفع الصورة...";

        canvas.toBlob(

            async (blob) => {

                const fileName =
`${SESSION_ID}/${Date.now()}.jpg`;

                const {
                    error
                } = await supabaseClient
                .storage
                .from("uploads")
                .upload(
                    fileName,
                    blob
                );

                if (error) {

                    console.log(error);

                    statusDiv.innerHTML =
                        "❌ فشل رفع الصورة";

                    return;
                }

                statusDiv.innerHTML =
                    "✅ تم رفع الصورة بنجاح";
            },

            "image/jpeg",
            0.95
        );
    }
);

</script>

</body>

</html>
