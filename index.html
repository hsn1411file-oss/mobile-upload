<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="pwa-manifest.json">

<meta
name="theme-color"
content="#2563eb">

<title>
رفع كشف الدرجات
</title>

<style>

:root{
    --frame-width:150px;
}

body{

    margin:0;
    font-family:Tahoma;
    background:#0f172a;
    color:white;
    text-align:center;

}

.container{

    padding:20px;

}

h1{

    margin-bottom:20px;

}

#videoContainer{

    position:relative;
    width:100%;
    max-width:500px;
    margin:auto;
    border-radius:20px;
    overflow:hidden;

}

video{

    width:100%;
    background:black;

}

.frame{

    position:absolute;
    top:0;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    width:var(--frame-width);
    border:4px solid red;
    border-radius:10px;
    pointer-events:none;
    box-sizing:border-box;

}

.controls{

    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:15px;

}

button{

    border:none;
    border-radius:12px;
    padding:14px 20px;
    font-size:18px;
    cursor:pointer;

}

#framePlus,
#frameMinus{

    width:60px;
    font-size:24px;
    background:#1e293b;
    color:white;

}

#captureBtn{

    background:#2563eb;
    color:white;
    width:220px;

}

#preview{

    margin-top:20px;
    max-width:100%;
    border-radius:15px;
    display:none;

}

#useBtn,
#retryBtn{

    margin-top:15px;
    width:180px;
    display:none;

}

#useBtn{

    background:#16a34a;
    color:white;

}

#retryBtn{

    background:#dc2626;
    color:white;

}

#status{

    margin-top:15px;
    font-size:18px;

}

canvas{

    display:none;

}

</style>

</head>

<body>

<div class="container">

<h1>
📸 رفع كشف الدرجات
</h1>

<div id="videoContainer">

<video
id="video"
autoplay
playsinline>
</video>

<div
class="frame"
id="frame">
</div>

</div>

<div class="controls">

<button id="frameMinus">
➖
</button>

<button id="framePlus">
➕
</button>

</div>

<div class="controls">

<button id="captureBtn">
📸 تصوير
</button>

</div>

<img id="preview">

<br>

<button id="useBtn">
✅ استخدام الصورة
</button>

<button id="retryBtn">
🔄 إعادة التصوير
</button>

<div id="status"></div>

<canvas id="canvas"></canvas>

</div>

<script>

const video =
document.getElementById(
    "video"
);

const canvas =
document.getElementById(
    "canvas"
);

const preview =
document.getElementById(
    "preview"
);

const captureBtn =
document.getElementById(
    "captureBtn"
);

const useBtn =
document.getElementById(
    "useBtn"
);

const retryBtn =
document.getElementById(
    "retryBtn"
);

const statusText =
document.getElementById(
    "status"
);

const framePlus =
document.getElementById(
    "framePlus"
);

const frameMinus =
document.getElementById(
    "frameMinus"
);

let frameWidth = 150;

document.documentElement
.style.setProperty(
    "--frame-width",
    frameWidth + "px"
);

let croppedBlob = null;

navigator.mediaDevices
.getUserMedia({

    video:{
        facingMode:"environment"
    }

})
.then(stream => {

    video.srcObject =
        stream;

});

framePlus.addEventListener(
    "click",

    () => {

        frameWidth += 20;

        if(frameWidth > 350)
            frameWidth = 350;

        document.documentElement
        .style.setProperty(
            "--frame-width",
            frameWidth + "px"
        );

    }
);

frameMinus.addEventListener(
    "click",

    () => {

        frameWidth -= 20;

        if(frameWidth < 80)
            frameWidth = 80;

        document.documentElement
        .style.setProperty(
            "--frame-width",
            frameWidth + "px"
        );

    }
);

captureBtn.addEventListener(
    "click",

    () => {

        const ctx =
            canvas.getContext("2d");

        const vw =
            video.videoWidth;

        const vh =
            video.videoHeight;

        const displayWidth =
            video.clientWidth;

        const scale =
            vw / displayWidth;

        const cropWidth =
            frameWidth * scale;

        const cropX =
            (vw / 2) -
            (cropWidth / 2);

        canvas.width =
            cropWidth;

        canvas.height =
            vh;

        ctx.drawImage(

            video,

            cropX,
            0,

            cropWidth,
            vh,

            0,
            0,

            cropWidth,
            vh

        );

        canvas.toBlob(blob => {

            croppedBlob =
                blob;

            preview.src =
                URL.createObjectURL(
                    blob
                );

            preview.style.display =
                "block";

            useBtn.style.display =
                "inline-block";

            retryBtn.style.display =
                "inline-block";

            video.style.display =
                "none";

            document.getElementById(
                "frame"
            ).style.display =
                "none";

        },
        "image/jpeg",
        0.95);

    }
);

retryBtn.addEventListener(
    "click",

    () => {

        preview.style.display =
            "none";

        useBtn.style.display =
            "none";

        retryBtn.style.display =
            "none";

        video.style.display =
            "block";

        document.getElementById(
            "frame"
        ).style.display =
            "block";

    }
);

useBtn.addEventListener(
    "click",

    async () => {

        statusText.innerHTML =
            "⏳ جاري الرفع...";

        const fileName =
            Date.now() + ".jpg";

        const formData =
            new FormData();

        formData.append(
            "file",
            croppedBlob,
            fileName
        );

        try{

            const response =
                await fetch(
                    "https://kztwzelltnomrbsdmukt.supabase.co/functions/v1/analyze-image",
                    {
                        method:"POST",
                        body:formData
                    }
                );

            if(!response.ok){

                throw new Error(
                    "Upload failed"
                );

            }

            statusText.innerHTML =
                "✅ تم الرفع بنجاح";

        }
        catch(error){

            console.error(error);

            statusText.innerHTML =
                "❌ فشل الرفع";

        }

    }
);

if (
    "serviceWorker"
    in navigator
) {

    navigator
    .serviceWorker
    .register(
        "./sw.js"
    )
    .then(() => {

        console.log(
            "SW Registered"
        );

    });

}

</script>

</body>
</html>
